<div class="flex flex-col gap-6 max-w-[512px] w-full" id="the-everything-div">
  <div id="create-poll-weird-div" class="text-[24px] font-semibold text-center">
    Create a Poll
  </div>
  <div
    class="border-[1px] border-[hsl(290,12%,82%,1)] border-solid rounded-[6px] flex flex-col gap-6 p-6 bg-[#ffff]"
    id="poll-form-div"
  >
    <div
      class="flex flex-col gap-2 max-w-[500px] w-full"
      id="poll-title-input-div"
    >
      <label for="" class="text-sm">Title</label>
      <input
        id="title-input"
        type="text"
        placeholder="What would you like to ask?"
        class="border-[rgb(236,233,236)] border-[1px] border-solid rounded-[6px] bg-inputs-background py-2 px-3 focus-visible:outline-magenta ::placeholder text-sm"
      />
    </div>
    <div class="flex flex-col gap-3">
      <label for="" class="capitalize text-sm">answer options</label>
      <div id="ops-div" class="flex flex-col gap-2">
        <div class="flex gap-2 items-center">
          <input
            data-element="option"
            type="text"
            placeholder="Option 1"
            class="border-[rgb(236,233,236)] border-[1px] w-full border-solid rounded-[6px] bg-inputs-background py-2 px-3 focus-visible:outline-magenta ::placeholder text-sm"
          />
          <div
            class="h-10 w-11 hidden flex justify-center items-center rounded-[6px] hover:bg-[rgb(205,152,156)] cursor-pointer"
            id="first-svg-div"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              data-del=""
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-trash2 h-4 w-4"
            >
              <path d="M3 6h18"></path>
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
              <line x1="10" x2="10" y1="11" y2="17"></line>
              <line x1="14" x2="14" y1="11" y2="17"></line>
            </svg>
          </div>
        </div>
      </div>
      <button
        id="ops-btn"
        class="capitalize border-[rgb(236,233,236)] border-[1px] border-solid bg-weird-white rounded-[6px] max-w-[128px] px-3 text-sm cursor-pointer h-9 flex items-center gap-3 transition duration-150 ease-in-out hover:bg-weird-red"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-plus h-4 w-4"
        >
          <path d="M5 12h14"></path>
          <path d="M12 5v14"></path>
        </svg>
        add option
      </button>
    </div>
    <div>
      <button
        id="submit-btn"
        class="capitalize bg-magenta text-white rounded-[6px] text-sm py-[10px] px-4 w-full cursor-pointer transition duration-150 ease-in-out hover:bg-whiter-magenta"
      >
        create poll
      </button>
    </div>
  </div>
</div>
<div
  class="flex items-center gap-2 bg-weird-white border-solid border-[1px] border-[rgb(213,204,215)] max-w-89 w-full p-4 rounded-[8px] right-8 ease-in-out translate-y-full duration-500 transiton-transform absolute bottom-0"
  id="the-message-div"
>
  <svg
    class="hidden"
    id="error-svg"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 20 20"
    fill="currentColor"
    height="20"
    width="20"
  >
    <path
      fill-rule="evenodd"
      d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a.75.75 0 01.75.75v4.5a.75.75 0 01-1.5 0v-4.5A.75.75 0 0110 5zm0 10a1 1 0 100-2 1 1 0 000 2z"
      clip-rule="evenodd"
    ></path>
  </svg>
  <svg
    id="success-svg"
    class="hidden"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 20 20"
    fill="currentColor"
    height="20"
    width="20"
  >
    <path
      fill-rule="evenodd"
      d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z"
      clip-rule="evenodd"
    ></path>
  </svg>
  <p id="the-message-p" class="text-[13px]">Please enter a poll title</p>
</div>
