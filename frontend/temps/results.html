{% extends "base.html" %} {% block body %}
<div
  class="border-1px border-solid border-[rgb(213,204,215)] bg-white p-8 flex flex-col w-full max-w-3xl rounded-lg border-weirder-whiter border-[1px]"
  id="container"
>
  <div>
    <div id="poll-title" class="text-2xl color-black font-bold mt-5"></div>

    <p class="text-sm text-font-something mb-8" id="info-p">by a guest · 6 minutes ago</p>
  </div>
  <div class="flex gap-5 flex-col" id="options-percentage-div"></div>
  <div
    id="border-div"
    class="border-b-[1px] mt-2 border-b-[hsl(290,12%,82%)] w-full mt-6 mb-6"
  ></div>
  <p id="total-votes-p" class="text-sm text-font-something">Total votes: 2</p>
  <div class="flex justify-between mt-6">
    <button
      id="back-to-poll-btn"
      class="flex items-center justify-center bg-weird-white cursor-pointer px-3 gap-2 h-9 transition duration-150ms rounded-md font-medium text-sm hover:bg-weird-red"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-arrow-left mr-2 h-4 w-4"
      >
        <path d="m12 19-7-7 7-7"></path>
        <path d="M19 12H5"></path>
      </svg>
      Back to poll
    </button>
    <button
      class="flex justify-center items-center gap-2 text-sm font-medium transition duration-150ms px-3 cursor-pointer rounded-md bg-weird-white hover:bg-weird-red"
      id="share-button"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-share2 mr-2 h-4 w-4"
      >
        <circle cx="18" cy="5" r="3"></circle>
        <circle cx="6" cy="12" r="3"></circle>
        <circle cx="18" cy="19" r="3"></circle>
        <line x1="8.59" x2="15.42" y1="13.51" y2="17.49"></line>
        <line x1="15.41" x2="8.59" y1="6.51" y2="10.49"></line>
      </svg>
      Share
    </button>
  </div>
  <div
    class="flex items-center gap-2 bg-weird-white border-solid border-[1px] border-[rgb(213,204,215)] max-w-89 w-full p-4 rounded-[8px] right-8 ease-in-out translate-y-full duration-500 transiton-transform absolute bottom-0"
    id="the-message-div"
  >
    <svg
      class="hidden"
      id="error-svg"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 20 20"
      fill="currentColor"
      height="20"
      width="20"
    >
      <path
        fill-rule="evenodd"
        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a.75.75 0 01.75.75v4.5a.75.75 0 01-1.5 0v-4.5A.75.75 0 0110 5zm0 10a1 1 0 100-2 1 1 0 000 2z"
        clip-rule="evenodd"
      ></path>
    </svg>
    <svg
      id="success-svg"
      class="hidden"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 20 20"
      fill="currentColor"
      height="20"
      width="20"
    >
      <path
        fill-rule="evenodd"
        d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z"
        clip-rule="evenodd"
      ></path>
    </svg>
    <p id="the-message-p" class="text-[13px]">Please enter a poll title</p>
  </div>
</div>

<script>
  window.UNQIUE_ID = "{{ unique_id }}";
</script>
{% endblock %}
