{% extends "base.html" %} {% block body %}
<div
  class="border-1px border-solid border-[rgb(213,204,215)] bg-white p-8 flex flex-col w-full max-w-3xl rounded-lg border-weirder-whiter border-[1px]"
  id="container"
>
  <div>
    <div id="poll-title" class="text-2xl color-black font-bold mt-5">
      Which programming language do you prefer
    </div>

    <p class="text-sm text-font-something mb-8">by a guest · 6 minutes ago</p>
  </div>
  <div class="flex gap-5 flex-col" id="options-percentage-div">

    <div class="flex flex-col gap-1">
      <div class="w-full flex justify-between text-sm">
        <p id="option">Python</p>
        <p class="" id="votes-percentage-p">50% (1 votes)</p>
      </div>
      <div class="w-full bg-[#E2DEE3] h-3 rounded-full">
        <div class="bg-red-600 max-w-[calc(100%-50%)] rounded-full h-3"></div>
      </div>
    </div>
    <div class="flex flex-col gap-1">
      <div class="w-full flex justify-between text-sm">
        <p id="option">Java</p>
        <p class="" id="votes-percentage-p">0% (0 votes)</p>
      </div>
      <div class="w-full bg-[#E2DEE3] h-3 rounded-full">
        <div class="bg-red-600 max-w-[calc(0%-50%)] rounded-full h-3"></div>
      </div>
    </div>
  </div>
  <div
    id="border-div"
    class="border-b-[1px] mt-2 border-b-[hsl(290,12%,82%)] w-full mt-6 mb-6"
  ></div>
  <p id="total-votes-p" class="text-sm text-font-something">Total votes: 2</p>
  <div class="flex justify-between mt-6">
    <button
    id="back-to-poll-btn"
      class="flex items-center justify-center bg-weird-white cursor-pointer px-3 gap-2 h-9 transition duration-150ms rounded-md font-medium text-sm hover:bg-weird-red"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-arrow-left mr-2 h-4 w-4"
      >
        <path d="m12 19-7-7 7-7"></path>
        <path d="M19 12H5"></path>
      </svg>
      Back to poll
    </button>
    <button
      class="flex justify-center items-center gap-2 text-sm font-medium transition duration-150ms px-3 cursor-pointer rounded-md bg-weird-white hover:bg-weird-red"
      id="share-button"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-share2 mr-2 h-4 w-4"
      >
        <circle cx="18" cy="5" r="3"></circle>
        <circle cx="6" cy="12" r="3"></circle>
        <circle cx="18" cy="19" r="3"></circle>
        <line x1="8.59" x2="15.42" y1="13.51" y2="17.49"></line>
        <line x1="15.41" x2="8.59" y1="6.51" y2="10.49"></line>
      </svg>
      Share
    </button>
  </div>
</div>

<script>
  window.UNQIUE_ID = "{{ unique_id }}";
</script>
{% endblock %}
